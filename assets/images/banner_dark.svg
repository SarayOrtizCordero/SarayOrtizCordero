<svg width="1200" height="675" viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05060a"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a1622"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="55%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>
  </defs>

  <!-- fondo -->
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <circle cx="130" cy="600" r="320" fill="url(#glow2)"/>
  <circle cx="1040" cy="90" r="340" fill="url(#glow1)"/>

  <!-- linea de acento superior -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- badge "Disponible" -->
  <g transform="translate(70,54)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#ffffff" opacity="0.06" stroke="#2dd4bf" stroke-opacity="0.4"/>
    <circle cx="20" cy="16" r="5.5" fill="#2dd4bf"/>
    <circle cx="20" cy="16" r="5.5" fill="#2dd4bf" opacity="0.4" filter="url(#softGlow)"/>
    <text x="35" y="21" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600" fill="#99f6e4" letter-spacing="0.5">DISPONIBLE</text>
  </g>

  <!-- === Texto principal === -->
  <text x="70" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="58" font-weight="700" fill="#f1f5f9" filter="url(#softGlow)">
    Saray Ortiz Cordero
  </text>
  <text x="70" y="175" font-family="'Segoe UI', Arial, sans-serif" font-size="58" font-weight="700" fill="#f8fafc">
    Saray Ortiz Cordero
  </text>

  <!-- linea de acento bajo el nombre -->
  <rect x="72" y="196" width="270" height="5" rx="2.5" fill="url(#accent)"/>
  <rect x="72" y="196" width="270" height="5" rx="2.5" fill="url(#accent)" opacity="0.5" filter="url(#softGlow)"/>

  <text x="70" y="240" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="600" fill="#cbd5e1">
    Desarrolladora Web
  </text>
  <text x="335" y="240" font-family="'Segoe UI', Arial, sans-serif" font-size="24" fill="#5eead4">·</text>
  <text x="358" y="240" font-family="'Segoe UI', Arial, sans-serif" font-size="24" font-weight="600" fill="#cbd5e1">
    Soporte Técnico y Sistemas
  </text>

  
  <!-- === CTA inferior === -->
  <g transform="translate(70,410)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="600" fill="#94a3b8">
      Proyectos y portfolio más abajo
    </text>
    <g transform="translate(268,-12)">
      <path d="M0 0 L14 12 L0 24" fill="none" stroke="#5eead4" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="opacity" values="1;0.4;1" dur="1.6s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- === Ilustración: terminal ampliada con doble bloque === -->
  <g transform="translate(800,90)">
    <rect x="0" y="0" width="330" height="480" rx="16" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.28"/>
    <rect x="0" y="0" width="330" height="480" rx="16" fill="none" stroke="#38bdf8" stroke-opacity="0.15" stroke-width="8" filter="url(#softGlow)"/>

    <!-- barra superior -->
    <rect x="0" y="0" width="330" height="34" rx="16" fill="#ffffff" opacity="0.05"/>
    <circle cx="20" cy="17" r="5" fill="#f87171"/>
    <circle cx="38" cy="17" r="5" fill="#fbbf24"/>
    <circle cx="56" cy="17" r="5" fill="#4ade80"/>
    <text x="165" y="22" text-anchor="middle" font-family="'Consolas', monospace" font-size="12" fill="#94a3b8">saray@dev — zsh</text>

    <!-- bloque 1: identidad -->
    <text x="20" y="66" font-family="'Consolas', monospace" font-size="14" fill="#5eead4">$ <tspan fill="#e2e8f0">whoami</tspan></text>
    <text x="20" y="88" font-family="'Consolas', monospace" font-size="14" fill="#94a3b8">desarrolladora-web</text>

    <text x="20" y="118" font-family="'Consolas', monospace" font-size="14" fill="#5eead4">$ <tspan fill="#e2e8f0">status --build</tspan></text>
    <rect x="20" y="132" width="290" height="9" rx="4.5" fill="#ffffff" opacity="0.08"/>
    <rect x="20" y="132" width="224" height="9" rx="4.5" fill="url(#accent)"/>

    <!-- mini wireframes tipo bento -->
    <rect x="20" y="156" width="90" height="52" rx="8" fill="#38bdf8" opacity="0.14" stroke="#38bdf8" stroke-opacity="0.45"/>
    <rect x="120" y="156" width="90" height="52" rx="8" fill="#a78bfa" opacity="0.14" stroke="#a78bfa" stroke-opacity="0.45"/>
    <rect x="220" y="156" width="90" height="52" rx="8" fill="#2dd4bf" opacity="0.14" stroke="#2dd4bf" stroke-opacity="0.45"/>

    <!-- separador -->
    <line x1="20" y1="234" x2="310" y2="234" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>

    <!-- bloque 2: sistemas / soporte tecnico -->
    <text x="20" y="264" font-family="'Consolas', monospace" font-size="14" fill="#5eead4">$ <tspan fill="#e2e8f0">systemctl status soporte-tecnico</tspan></text>
    <g transform="translate(20,280)">
      <circle cx="6" cy="6" r="6" fill="#4ade80"/>
      <text x="20" y="10" font-family="'Consolas', monospace" font-size="13" fill="#86efac">active (running)</text>
    </g>

    <text x="20" y="322" font-family="'Consolas', monospace" font-size="14" fill="#5eead4">$ <tspan fill="#e2e8f0">ls skills/</tspan></text>
    <text x="20" y="346" font-family="'Consolas', monospace" font-size="13" fill="#7dd3fc">virtualbox   xampp/apache</text>
    <text x="20" y="366" font-family="'Consolas', monospace" font-size="13" fill="#7dd3fc">sql/mysql    instalacion-so</text>

    <!-- icono de servidor / sistema -->
    <g transform="translate(230,300)">
      <rect x="0" y="0" width="80" height="70" rx="8" fill="#ffffff" opacity="0.04" stroke="#94a3b8" stroke-opacity="0.3"/>
      <rect x="10" y="10" width="60" height="14" rx="3" fill="#38bdf8" opacity="0.35"/>
      <rect x="10" y="30" width="60" height="14" rx="3" fill="#a78bfa" opacity="0.35"/>
      <rect x="10" y="50" width="60" height="14" rx="3" fill="#2dd4bf" opacity="0.35"/>
      <circle cx="18" cy="17" r="2.4" fill="#5eead4"/>
      <circle cx="18" cy="37" r="2.4" fill="#5eead4"/>
      <circle cx="18" cy="57" r="2.4" fill="#5eead4"/>
    </g>

    <!-- cursor parpadeante -->
    <rect x="20" y="392" width="10" height="16" fill="#5eead4">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>

    <!-- pie de la tarjeta -->
    <line x1="20" y1="430" x2="310" y2="430" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    <text x="20" y="456" font-family="'Consolas', monospace" font-size="12" fill="#64748b">github.com/saray-dev</text>
  </g>

  <!-- viñeta final -->
  <rect width="1200" height="675" fill="url(#vignette)"/>
</svg>
