<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05060a"/>
      <stop offset="55%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a1622"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="55%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.45"/>
    </radialGradient>
  </defs>

  <!-- fondo -->
  <rect width="1200" height="300" fill="url(#bg)"/>
  <rect width="1200" height="300" fill="url(#grid)"/>
  <circle cx="150" cy="260" r="240" fill="url(#glow2)"/>
  <circle cx="990" cy="60" r="260" fill="url(#glow1)"/>

  <!-- linea de acento superior -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)"/>

  <!-- badge "Disponible" -->
  <g transform="translate(70,46)">
    <rect x="0" y="0" width="118" height="28" rx="14" fill="#ffffff" opacity="0.06" stroke="#2dd4bf" stroke-opacity="0.4"/>
    <circle cx="18" cy="14" r="5" fill="#2dd4bf"/>
    <circle cx="18" cy="14" r="5" fill="#2dd4bf" opacity="0.4" filter="url(#softGlow)"/>
    <text x="32" y="19" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="600" fill="#99f6e4" letter-spacing="0.5">DISPONIBLE</text>
  </g>

  <!-- === Texto principal === -->
  <text x="70" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" fill="#f1f5f9" filter="url(#softGlow)">
    Saray Ortiz Cordero
  </text>
  <text x="70" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="46" font-weight="700" fill="#f8fafc">
    Saray Ortiz Cordero
  </text>

  <!-- linea de acento bajo el nombre -->
  <rect x="72" y="144" width="230" height="4" rx="2" fill="url(#accent)"/>
  <rect x="72" y="144" width="230" height="4" rx="2" fill="url(#accent)" opacity="0.5" filter="url(#softGlow)"/>

  <text x="70" y="184" font-family="'Segoe UI', Arial, sans-serif" font-size="21" font-weight="600" fill="#cbd5e1">
    Desarrolladora Web
  </text>
  <text x="335" y="184" font-family="'Segoe UI', Arial, sans-serif" font-size="21" fill="#5eead4">·</text>
  <text x="355" y="184" font-family="'Segoe UI', Arial, sans-serif" font-size="21" font-weight="600" fill="#cbd5e1">
    Soporte Técnico y Sistemas
  </text>

  <text x="70" y="216" font-family="'Segoe UI', Arial, sans-serif" font-size="17" fill="#7dd3fc" opacity="0.9">
    Interés en diseño de interfaces (UI) y experiencia de usuario (UX)
  </text>

  <!-- === Ilustración: terminal con prompt + wireframes UI === -->
  <g transform="translate(860,50)">
    <rect x="0" y="0" width="280" height="196" rx="14" fill="url(#card)" stroke="#38bdf8" stroke-opacity="0.28"/>
    <rect x="0" y="0" width="280" height="196" rx="14" fill="none" stroke="#38bdf8" stroke-opacity="0.15" stroke-width="8" filter="url(#softGlow)"/>

    <!-- barra superior -->
    <rect x="0" y="0" width="280" height="30" rx="14" fill="#ffffff" opacity="0.05"/>
    <circle cx="18" cy="15" r="4.5" fill="#f87171"/>
    <circle cx="34" cy="15" r="4.5" fill="#fbbf24"/>
    <circle cx="50" cy="15" r="4.5" fill="#4ade80"/>
    <text x="140" y="19" text-anchor="middle" font-family="'Consolas', monospace" font-size="11" fill="#94a3b8">saray@dev — zsh</text>

    <!-- contenido terminal -->
    <text x="18" y="56" font-family="'Consolas', monospace" font-size="13" fill="#5eead4">$ <tspan fill="#e2e8f0">whoami</tspan></text>
    <text x="18" y="76" font-family="'Consolas', monospace" font-size="13" fill="#94a3b8">desarrolladora-web · ui/ux</text>

    <text x="18" y="100" font-family="'Consolas', monospace" font-size="13" fill="#5eead4">$ <tspan fill="#e2e8f0">status --build</tspan></text>

    <!-- barra de progreso -->
    <rect x="18" y="112" width="244" height="8" rx="4" fill="#ffffff" opacity="0.08"/>
    <rect x="18" y="112" width="188" height="8" rx="4" fill="url(#accent)"/>

    <!-- mini wireframes -->
    <rect x="18" y="134" width="76" height="44" rx="7" fill="#38bdf8" opacity="0.14" stroke="#38bdf8" stroke-opacity="0.45"/>
    <rect x="102" y="134" width="76" height="44" rx="7" fill="#a78bfa" opacity="0.14" stroke="#a78bfa" stroke-opacity="0.45"/>
    <rect x="186" y="134" width="76" height="44" rx="7" fill="#2dd4bf" opacity="0.14" stroke="#2dd4bf" stroke-opacity="0.45"/>

    <!-- cursor parpadeante -->
    <rect x="18" y="186" width="9" height="14" fill="#5eead4">
      <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- viñeta final -->
  <rect width="1200" height="300" fill="url(#vignette)"/>
</svg>
